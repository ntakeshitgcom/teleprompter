<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テレプロンプター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }

/* 画面切り替えはシンプルにvisibilityで */
#editScreen {
  position: fixed; inset: 0;
  background: #111;
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: 20px;
  gap: 12px;
  overflow-y: auto;
}
#prompterScreen {
  position: fixed; inset: 0;
  background: #000;
  color: #fff;
  display: none; /* JSでflexに切り替え */
  flex-direction: column;
}

/* Edit */
h1 { font-size: 18px; color: #00e87a; }
textarea {
  width: 100%; height: 160px;
  background: #222; border: 1px solid #444; border-radius: 8px;
  color: #fff; font-size: 16px; padding: 12px;
  resize: none;
}
button {
  padding: 14px; border-radius: 10px; border: none;
  font-size: 16px; font-weight: bold; cursor: pointer;
}
.btn-start { background: #00e87a; color: #000; }
.btn-back  { background: #333; color: #fff; }

/* Prompter */
#prompterScreen { position: fixed; inset: 0; background: #111; }

/* 台本パネル */
#panel {
  position: absolute;
  top: 70px; bottom: 80px;
  left: 16px; right: 16px;
  background: rgba(0,0,0,0.7);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 16px;
  overflow: hidden;
}
#mask { position: absolute; inset: 0; overflow: hidden; }
#content { padding: 40% 20px 60%; }
#scriptText { font-size: 30px; line-height: 1.8; color: #fff; font-weight: bold; word-break: break-all; }

/* controls */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 64px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 16px;
  background: rgba(0,0,0,0.6);
}
.bot-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 76px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 16px; gap: 12px;
  background: rgba(0,0,0,0.6);
}
.ibtn {
  width: 44px; height: 44px; border-radius: 50%;
  background: #333; color: #fff; font-size: 18px;
  border: 1px solid #555; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pp {
  width: 58px; height: 58px; border-radius: 50%;
  background: rgba(0,232,122,0.15); color: #00e87a;
  border: 2px solid #00e87a; font-size: 24px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.pp.playing { background: rgba(255,208,0,0.15); color: #ffd000; border-color: #ffd000; }
.spd { display: flex; align-items: center; gap: 8px; flex: 1; }
.spd input { flex: 1; height: 4px; -webkit-appearance: none; background: #444; border-radius: 2px; }
.spd input::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #00e87a; }
.spd-num { font-size: 13px; color: #00e87a; font-weight: bold; min-width: 20px; text-align: center; }

/* Camera */
#camVideo {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  -webkit-transform: scaleX(-1);
  z-index: 0;
  background: transparent;
}
#panel { z-index: 2; }
.top-bar { z-index: 3; }
.bot-bar { z-index: 3; }
</style>
</head>
<body>

<!-- EDIT -->
<div id="editScreen">
  <h1>📽 テレプロンプター</h1>
  <textarea id="txt" placeholder="台本を入力..."></textarea>

  <div style="display:flex;align-items:center;justify-content:space-between;background:#222;padding:12px;border-radius:10px;">
    <span style="font-size:13px;">文字サイズ</span>
    <div style="display:flex;gap:6px;">
      <button onclick="setFS(24,this)" style="padding:6px 10px;font-size:12px;background:#333;color:#aaa;border-radius:6px;border:1px solid #444;">小</button>
      <button onclick="setFS(30,this)" style="padding:6px 10px;font-size:12px;background:#00e87a;color:#000;border-radius:6px;border:none;" id="fsDef">中</button>
      <button onclick="setFS(38,this)" style="padding:6px 10px;font-size:12px;background:#333;color:#aaa;border-radius:6px;border:1px solid #444;">大</button>
      <button onclick="setFS(48,this)" style="padding:6px 10px;font-size:12px;background:#333;color:#aaa;border-radius:6px;border:1px solid #444;">特大</button>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;background:#222;padding:12px;border-radius:10px;">
    <span style="font-size:13px;">スクロール速度 <span id="spdLbl" style="color:#00e87a;font-weight:bold;">3</span></span>
    <div style="display:flex;gap:8px;">
      <button onclick="chgSpd(-1)" style="width:36px;height:36px;border-radius:50%;background:#333;color:#fff;border:1px solid #555;font-size:20px;">−</button>
      <button onclick="chgSpd(1)"  style="width:36px;height:36px;border-radius:50%;background:#333;color:#fff;border:1px solid #555;font-size:20px;">＋</button>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;background:#222;padding:12px;border-radius:10px;">
    <span style="font-size:13px;">カメラ背景</span>
    <label style="position:relative;width:48px;height:27px;">
      <input type="checkbox" id="camOn" checked style="opacity:0;width:0;height:0;">
      <span id="togTrack" style="position:absolute;inset:0;background:#00e87a;border-radius:14px;cursor:pointer;transition:background .2s;"></span>
      <span id="togThumb" style="position:absolute;left:3px;top:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.4);"></span>
    </label>
  </div>

  <button class="btn-start" onclick="goPrompter()">▶ スタート</button>
</div>

<!-- PROMPTER -->
<div id="prompterScreen">
  <video id="camVideo" playsinline webkit-playsinline muted autoplay></video>

  <div id="panel">
    <div id="mask">
      <div id="content">
        <div id="scriptText"></div>
      </div>
    </div>
  </div>

  <div class="top-bar">
    <button class="ibtn" onclick="goEdit()">←</button>
    <span style="font-size:13px;color:#aaa;" id="status">停止中</span>
    <button class="ibtn" onclick="resetScroll()">↺</button>
  </div>

  <div class="bot-bar">
    <button class="ibtn" onclick="chgPS(-1)">−</button>
    <div class="spd">
      <span class="spd-num" id="pSpdNum">3</span>
      <input type="range" min="1" max="10" value="3" id="pSlider" oninput="setSpdSlider(this.value)">
    </div>
    <button class="ibtn" onclick="chgPS(1)">＋</button>
    <button class="pp" id="ppBtn" onclick="togglePlay()">▶</button>
  </div>
</div>

<script>
var spd = 3, fontSize = 30;
var playing = false, scrollY = 0, lastTS = null, raf = null;
var stream = null;

/* トグル見た目 */
var camOnEl = document.getElementById('camOn');
var togTrack = document.getElementById('togTrack');
var togThumb = document.getElementById('togThumb');
function updateToggle() {
  var on = camOnEl.checked;
  togTrack.style.background = on ? '#00e87a' : '#444';
  togThumb.style.transform  = on ? 'translateX(21px)' : 'none';
}
camOnEl.addEventListener('change', updateToggle);
updateToggle();

function setFS(sz, btn) {
  fontSize = sz;
  document.querySelectorAll('[onclick^="setFS"]').forEach(function(b) {
    b.style.background = '#333'; b.style.color = '#aaa'; b.style.border = '1px solid #444';
  });
  btn.style.background = '#00e87a'; btn.style.color = '#000'; btn.style.border = 'none';
}

function chgSpd(d) {
  spd = Math.max(1, Math.min(10, spd + d));
  document.getElementById('spdLbl').textContent = spd;
  document.getElementById('pSpdNum').textContent = spd;
  document.getElementById('pSlider').value = spd;
}

function goPrompter() {
  var text = document.getElementById('txt').value.trim();
  if (!text) { alert('台本を入力してください'); return; }

  document.getElementById('scriptText').textContent = text;
  document.getElementById('scriptText').style.fontSize = fontSize + 'px';

  /* 画面切り替え */
  document.getElementById('editScreen').style.display = 'none';
  document.getElementById('prompterScreen').style.display = 'flex';

  scrollY = 0; lastTS = null;
  document.getElementById('content').style.transform = 'translateY(0)';
  playing = false;
  document.getElementById('ppBtn').textContent = '▶';
  document.getElementById('ppBtn').className = 'pp';
  document.getElementById('status').textContent = '停止中';

  if (camOnEl.checked) {
    startCam();
  } else {
    document.getElementById('camVideo').style.display = 'none';
  }
}

function startCam() {
  var vid = document.getElementById('camVideo');
  vid.style.display = 'block';

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: true
  }).then(function(s) {
    stream = s;
    vid.srcObject = s;
    vid.onloadeddata = function() {
      vid.play().catch(function() {});
    };
    vid.load();
  }).catch(function(e) {
    vid.style.display = 'none';
    alert('カメラエラー: ' + e.name + '\n' + e.message);
  });
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
  var vid = document.getElementById('camVideo');
  try { vid.pause(); vid.srcObject = null; } catch(e) {}
  vid.style.display = 'none';
}

function goEdit() {
  playing = false;
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  stopCam();
  document.getElementById('prompterScreen').style.display = 'none';
  document.getElementById('editScreen').style.display = 'flex';
}

/* Scroll */
function togglePlay() {
  playing = !playing;
  var btn = document.getElementById('ppBtn');
  btn.textContent = playing ? '⏸' : '▶';
  btn.className = playing ? 'pp playing' : 'pp';
  document.getElementById('status').textContent = playing ? '再生中' : '停止中';
  if (playing) { lastTS = null; raf = requestAnimationFrame(animate); }
  else { cancelAnimationFrame(raf); raf = null; }
}

function animate(ts) {
  if (!playing) return;
  if (!lastTS) lastTS = ts;
  var dt = ts - lastTS; lastTS = ts;
  scrollY += spd * 35 * dt / 1000;
  var content = document.getElementById('content');
  var mask    = document.getElementById('mask');
  var max     = content.scrollHeight - mask.clientHeight;
  if (scrollY >= max) { scrollY = max; playing = false; document.getElementById('ppBtn').textContent = '▶'; document.getElementById('ppBtn').className = 'pp'; }
  content.style.transform = 'translateY(-' + scrollY + 'px)';
  raf = requestAnimationFrame(animate);
}

function resetScroll() { scrollY = 0; lastTS = null; document.getElementById('content').style.transform = 'translateY(0)'; }

function chgPS(d) {
  spd = Math.max(1, Math.min(10, spd + d));
  document.getElementById('pSpdNum').textContent = spd;
  document.getElementById('pSlider').value = spd;
}
function setSpdSlider(v) { spd = +v; document.getElementById('pSpdNum').textContent = spd; }

/* ストリーム解放 */
document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'hidden') stopCam(); });
window.addEventListener('pagehide', stopCam);
</script>
</body>
</html>
